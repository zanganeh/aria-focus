name: Signed public release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing version tag to build (for example v0.3.0)
        required: true
        type: string

concurrency:
  group: public-release-${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-sign-publish:
    name: Verify, build, sign, and create draft
    runs-on: windows-latest
    timeout-minutes: 120
    environment: public-release
    permissions:
      actions: read
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
      TAURI_BUILD_CONFIG: src-tauri/tauri.release.conf.json
      UPDATER_CONFIGURED: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD != '' && vars.TAURI_UPDATER_PUBLIC_KEY != '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: rustfmt, clippy
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.11.1
          cache: pnpm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pnpm install --frozen-lockfile
      - name: Verify tag and pinned release identity
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -ne "refs/tags/$env:RELEASE_TAG") {
            throw "The workflow trigger tag differs from the requested release tag."
          }
          $exact = git describe --tags --exact-match HEAD
          if ($LASTEXITCODE -ne 0 -or $exact -ne $env:RELEASE_TAG) {
            throw "Checked-out commit is not the requested exact tag."
          }
          python scripts/verify_release_tag.py $env:RELEASE_TAG
      - name: Download pinned reviewed library
        shell: pwsh
        run: |
          $config = Get-Content -Raw release/public-release-assets.json | ConvertFrom-Json
          New-Item -ItemType Directory -Force release-input | Out-Null
          gh release download $config.library_release_tag `
            --pattern $config.library_asset_name `
            --dir release-input
          if ($LASTEXITCODE -ne 0) { throw "Pinned reviewed-library download failed." }
          python scripts/stage_public_library.py `
            release/public-release-assets.json `
            "release-input/$($config.library_asset_name)" `
            apps/desktop/src-tauri/private-beta-pack
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Verify source and release content
        shell: pwsh
        run: |
          python scripts/check_repository_hygiene.py
          python -m unittest discover -s scripts -p 'test_*.py'
          python scripts/verify_public_library.py
          pnpm verify
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace
      - name: Configure signed updater build when updater secrets are configured
        if: ${{ env.UPDATER_CONFIGURED == 'true' }}
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
        shell: pwsh
        run: |
          node scripts/prepare-tauri-updater-config.cjs `
            apps/desktop/src-tauri/tauri.conf.json `
            apps/desktop/src-tauri/tauri.release.conf.json `
            apps/desktop/src-tauri/tauri.release-updater.conf.json
          "TAURI_BUILD_CONFIG=src-tauri/tauri.release-updater.conf.json" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Build release installers
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm -C apps/desktop tauri build --features bundled-library --config $env:TAURI_BUILD_CONFIG
      - name: Collect unsigned installers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force unsigned | Out-Null
          $msi = @(Get-ChildItem target/release/bundle/msi/*.msi -File)
          $nsis = @(Get-ChildItem target/release/bundle/nsis/*.exe -File)
          if ($msi.Count -ne 1 -or $nsis.Count -ne 1) {
            throw "Expected exactly one unsigned MSI and one unsigned NSIS installer."
          }
          Copy-Item -LiteralPath $msi[0].FullName -Destination unsigned/
          Copy-Item -LiteralPath $nsis[0].FullName -Destination unsigned/
      - name: Upload unsigned artifact for origin verification
        id: upload-unsigned
        uses: actions/upload-artifact@v7
        with:
          name: aria-focus-unsigned-${{ env.RELEASE_TAG }}
          path: unsigned/*
          if-no-files-found: error
          retention-days: 14
      - name: Submit to SignPath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed
      - name: Verify signed outputs and checksums
        shell: pwsh
        run: |
          $files = @(Get-ChildItem signed -Recurse -File | Where-Object Extension -in '.exe', '.msi')
          if ($files.Count -ne 2) { throw "Expected one signed EXE and one signed MSI." }
          if (@($files | Group-Object Extension | Where-Object Count -ne 1).Count -ne 0) {
            throw "Signed output must contain exactly one file of each installer type."
          }
          New-Item -ItemType Directory -Force release-output | Out-Null
          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature -LiteralPath $file.FullName
            if ($signature.Status -ne 'Valid') {
              throw "Invalid Authenticode signature: $($file.Name)"
            }
            Copy-Item -LiteralPath $file.FullName -Destination release-output/
          }
          Get-ChildItem release-output -File | Sort-Object Name | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          } | Set-Content -Encoding ascii release-output/SHA256SUMS
      - name: Collect updater artifacts and latest.json
        if: ${{ env.UPDATER_CONFIGURED == 'true' }}
        shell: pwsh
        run: |
          $nsisZip = @(Get-ChildItem target/release/bundle/nsis/*.zip -File)
          $nsisSig = @(Get-ChildItem target/release/bundle/nsis/*.zip.sig -File)
          if ($nsisZip.Count -ne 1 -or $nsisSig.Count -ne 1) {
            throw "Expected one signed NSIS updater archive and signature."
          }
          Copy-Item -LiteralPath $nsisZip[0].FullName -Destination release-output/
          Copy-Item -LiteralPath $nsisSig[0].FullName -Destination release-output/
          $version = $env:RELEASE_TAG.TrimStart('v')
          $signature = Get-Content -Raw -LiteralPath $nsisSig[0].FullName
          $latest = [ordered]@{
            version = $version
            notes = "Aria Focus $env:RELEASE_TAG"
            pub_date = (Get-Date).ToUniversalTime().ToString('o')
            platforms = [ordered]@{
              'windows-x86_64' = [ordered]@{
                signature = $signature.Trim()
                url = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:RELEASE_TAG/$($nsisZip[0].Name)"
              }
            }
          }
          $latest | ConvertTo-Json -Depth 6 | Set-Content -Encoding utf8 release-output/latest.json
      - name: Finalize release checksums
        shell: pwsh
        run: |
          Remove-Item -LiteralPath release-output/SHA256SUMS -Force -ErrorAction SilentlyContinue
          Get-ChildItem release-output -File | Sort-Object Name | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          } | Set-Content -Encoding ascii release-output/SHA256SUMS
      - name: Create or update draft release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view $env:RELEASE_TAG --json isDraft,isPrerelease | Set-Content release-state.json
          if ($LASTEXITCODE -eq 0) {
            $release = Get-Content -Raw release-state.json | ConvertFrom-Json
            if (-not $release.isDraft) {
              throw "Refusing to replace assets on a published release. Cut a new version."
            }
          } else {
            gh release create $env:RELEASE_TAG `
              --verify-tag `
              --draft `
              --generate-notes `
              --title "Aria Focus $env:RELEASE_TAG"
            if ($LASTEXITCODE -ne 0) { throw "Draft release creation failed." }
          }
          gh release upload $env:RELEASE_TAG release-output/* --clobber
          if ($LASTEXITCODE -ne 0) { throw "Signed release upload failed." }
