name: Signed public release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: New stable version tag to create (for example v0.3.0)
        required: true
        type: string
      source_ref:
        description: Branch or commit to release; the workflow creates the tag after all gates pass
        required: true
        default: main
        type: string
      publish_release:
        description: Publish the verified release immediately; leave unchecked for a draft
        required: true
        default: false
        type: boolean

concurrency:
  group: public-release-${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-sign-publish:
    name: Verify, build, sign, and create draft
    runs-on: windows-latest
    timeout-minutes: 120
    environment: public-release
    permissions:
      actions: read
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
      SOURCE_REF: ${{ github.event_name == 'push' && github.ref_name || inputs.source_ref }}
      TAURI_BUILD_CONFIG: src-tauri/tauri.release.conf.json
      UPDATER_CONFIGURED: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD != '' && vars.TAURI_UPDATER_PUBLIC_KEY != '' }}
      SIGNPATH_CONFIGURED: ${{ secrets.SIGNPATH_API_TOKEN != '' && vars.SIGNPATH_ORGANIZATION_ID != '' && vars.SIGNPATH_PROJECT_SLUG != '' && vars.SIGNPATH_SIGNING_POLICY_SLUG != '' && vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG != '' }}
      APPLE_CONFIGURED: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_ID != '' && secrets.APPLE_PASSWORD != '' && secrets.KEYCHAIN_PASSWORD != '' && vars.APPLE_TEAM_ID != '' && vars.APPLE_SIGNING_IDENTITY != '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.SOURCE_REF }}
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: rustfmt, clippy
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.11.1
          cache: pnpm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate protected release configuration
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $missing = @()
          if ($env:SIGNPATH_CONFIGURED -ne 'true') {
            $missing += 'SignPath environment secret/variables'
          }
          if ($env:APPLE_CONFIGURED -ne 'true') {
            $missing += 'Apple Developer signing/notarization environment secrets/variables'
          }
          if ($missing.Count -gt 0) {
            throw "The public-release environment is incomplete: $($missing -join ', '). See docs/releases.md before running a stable release."
          }
          $config = Get-Content -Raw release/public-release-assets.json | ConvertFrom-Json
          if ($config.library_asset_sha256 -notmatch '^[0-9a-f]{64}$') {
            throw 'release/public-release-assets.json does not contain an approved lowercase library SHA-256.'
          }
          gh release view $config.library_release_tag --json isDraft,isPrerelease,assets | Set-Content release-library-state.json
          if ($LASTEXITCODE -ne 0) {
            throw "The pinned reviewed-library release '$($config.library_release_tag)' does not exist."
          }
          $libraryRelease = Get-Content -Raw release-library-state.json | ConvertFrom-Json
          if ($libraryRelease.isDraft -or $libraryRelease.isPrerelease) {
            throw "The pinned reviewed-library release '$($config.library_release_tag)' must be published and non-preview."
          }
          $asset = @($libraryRelease.assets | Where-Object name -eq $config.library_asset_name)
          if ($asset.Count -ne 1) {
            throw "The pinned reviewed-library asset '$($config.library_asset_name)' is missing or ambiguous."
          }
      - run: pnpm install --frozen-lockfile
      - name: Verify release identity
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq 'push') {
            if ($env:GITHUB_REF -ne "refs/tags/$env:RELEASE_TAG") {
              throw "The workflow trigger tag differs from the requested release tag."
            }
            $exact = git describe --tags --exact-match HEAD
            if ($LASTEXITCODE -ne 0 -or $exact -ne $env:RELEASE_TAG) {
              throw "Checked-out commit is not the requested exact tag."
            }
          } else {
            $existing = git ls-remote --tags origin "refs/tags/$env:RELEASE_TAG"
            if ($LASTEXITCODE -eq 0 -and $existing) {
              throw "Release tag already exists. Dispatch a new version instead of replacing it."
            }
          }
          python scripts/verify_release_tag.py $env:RELEASE_TAG
          "RELEASE_SOURCE_SHA=$((git rev-parse HEAD).Trim())" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Download pinned reviewed library
        shell: pwsh
        run: |
          $config = Get-Content -Raw release/public-release-assets.json | ConvertFrom-Json
          New-Item -ItemType Directory -Force release-input | Out-Null
          gh release download $config.library_release_tag `
            --pattern $config.library_asset_name `
            --dir release-input
          if ($LASTEXITCODE -ne 0) { throw "Pinned reviewed-library download failed." }
          python scripts/stage_public_library.py `
            release/public-release-assets.json `
            "release-input/$($config.library_asset_name)" `
            apps/desktop/src-tauri/private-beta-pack
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Verify source and release content
        shell: pwsh
        run: |
          python scripts/check_repository_hygiene.py
          python -m unittest discover -s scripts -p 'test_*.py'
          python scripts/verify_public_library.py
          pnpm verify
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace
      - name: Configure signed updater build when updater secrets are configured
        if: ${{ env.UPDATER_CONFIGURED == 'true' }}
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
        shell: pwsh
        run: |
          node scripts/prepare-tauri-updater-config.cjs `
            apps/desktop/src-tauri/tauri.conf.json `
            apps/desktop/src-tauri/tauri.release.conf.json `
            apps/desktop/src-tauri/tauri.release-updater.conf.json
          "TAURI_BUILD_CONFIG=src-tauri/tauri.release-updater.conf.json" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Build release installers
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm -C apps/desktop tauri build --features bundled-library --config $env:TAURI_BUILD_CONFIG
      - name: Collect unsigned installers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force unsigned | Out-Null
          $msi = @(Get-ChildItem target/release/bundle/msi/*.msi -File)
          $nsis = @(Get-ChildItem target/release/bundle/nsis/*.exe -File)
          if ($msi.Count -ne 1 -or $nsis.Count -ne 1) {
            throw "Expected exactly one unsigned MSI and one unsigned NSIS installer."
          }
          Copy-Item -LiteralPath $msi[0].FullName -Destination unsigned/
          Copy-Item -LiteralPath $nsis[0].FullName -Destination unsigned/
      - name: Upload unsigned artifact for origin verification
        id: upload-unsigned
        uses: actions/upload-artifact@v7
        with:
          name: aria-focus-unsigned-${{ env.RELEASE_TAG }}
          path: unsigned/*
          if-no-files-found: error
          retention-days: 14
      - name: Submit to SignPath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed
      - name: Verify signed outputs and checksums
        shell: pwsh
        run: |
          $files = @(Get-ChildItem signed -Recurse -File | Where-Object Extension -in '.exe', '.msi')
          if ($files.Count -ne 2) { throw "Expected one signed EXE and one signed MSI." }
          if (@($files | Group-Object Extension | Where-Object Count -ne 1).Count -ne 0) {
            throw "Signed output must contain exactly one file of each installer type."
          }
          New-Item -ItemType Directory -Force release-output | Out-Null
          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature -LiteralPath $file.FullName
            if ($signature.Status -ne 'Valid') {
              throw "Invalid Authenticode signature: $($file.Name)"
            }
            Copy-Item -LiteralPath $file.FullName -Destination release-output/
          }
          Get-ChildItem release-output -File | Sort-Object Name | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          } | Set-Content -Encoding ascii release-output/SHA256SUMS
      - name: Collect updater artifacts and latest.json
        if: ${{ env.UPDATER_CONFIGURED == 'true' }}
        shell: pwsh
        run: |
          $nsisZip = @(Get-ChildItem target/release/bundle/nsis/*.zip -File)
          $nsisSig = @(Get-ChildItem target/release/bundle/nsis/*.zip.sig -File)
          if ($nsisZip.Count -ne 1 -or $nsisSig.Count -ne 1) {
            throw "Expected one signed NSIS updater archive and signature."
          }
          Copy-Item -LiteralPath $nsisZip[0].FullName -Destination release-output/
          Copy-Item -LiteralPath $nsisSig[0].FullName -Destination release-output/
          $version = $env:RELEASE_TAG.TrimStart('v')
          $signature = Get-Content -Raw -LiteralPath $nsisSig[0].FullName
          $latest = [ordered]@{
            version = $version
            notes = "Aria Focus $env:RELEASE_TAG"
            pub_date = (Get-Date).ToUniversalTime().ToString('o')
            platforms = [ordered]@{
              'windows-x86_64' = [ordered]@{
                signature = $signature.Trim()
                url = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:RELEASE_TAG/$($nsisZip[0].Name)"
              }
            }
          }
          $latest | ConvertTo-Json -Depth 6 | Set-Content -Encoding utf8 release-output/latest.json
      - name: Finalize release checksums
        shell: pwsh
        run: |
          Remove-Item -LiteralPath release-output/SHA256SUMS -Force -ErrorAction SilentlyContinue
          Get-ChildItem release-output -File | Sort-Object Name | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          } | Set-Content -Encoding ascii release-output/SHA256SUMS
      - name: Create release tag from Actions after signing
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tagRef = "refs/tags/$($env:RELEASE_TAG)"
          gh api --method POST "repos/$env:GITHUB_REPOSITORY/git/refs" `
            -f ref=$tagRef `
            -f sha=$env:RELEASE_SOURCE_SHA
          if ($LASTEXITCODE -ne 0) { throw "GitHub Actions could not create the release tag after signing." }
      - name: Create or update draft release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view $env:RELEASE_TAG --json isDraft,isPrerelease | Set-Content release-state.json
          if ($LASTEXITCODE -eq 0) {
            $release = Get-Content -Raw release-state.json | ConvertFrom-Json
            if (-not $release.isDraft) {
              throw "Refusing to replace assets on a published release. Cut a new version."
            }
            if ($release.isPrerelease) {
              throw "Refusing to reuse a prerelease release for a stable build. Cut a new version."
            }
          } else {
            gh release create $env:RELEASE_TAG `
              --verify-tag `
              --draft `
              --generate-notes `
              --title "Aria Focus $env:RELEASE_TAG"
            if ($LASTEXITCODE -ne 0) { throw "Draft release creation failed." }
          }
          gh release upload $env:RELEASE_TAG release-output/* --clobber
          if ($LASTEXITCODE -ne 0) { throw "Signed release upload failed." }

  build-macos-release-assets:
    name: Signed and notarized macOS release assets (${{ matrix.arch }})
    needs: build-sign-publish
    runs-on: ${{ matrix.runner }}
    environment: public-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            arch: aarch64
          - runner: macos-15-intel
            arch: x86_64
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      APPLE_SIGNING_IDENTITY: ${{ vars.APPLE_SIGNING_IDENTITY }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@1.92.0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.11.1
          cache: pnpm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pnpm install --frozen-lockfile
      - name: Stage the pinned reviewed library
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p release-input
          library_tag=$(python -c "import json; print(json.load(open('release/public-release-assets.json', encoding='utf-8'))['library_release_tag'])")
          library_name=$(python -c "import json; print(json.load(open('release/public-release-assets.json', encoding='utf-8'))['library_asset_name'])")
          gh release download "$library_tag" --pattern "$library_name" --dir release-input
          python scripts/stage_public_library.py \
            release/public-release-assets.json \
            "release-input/$library_name" \
            apps/desktop/src-tauri/private-beta-pack
          python scripts/verify_public_library.py
      - name: Import Apple Developer certificate
        shell: bash
        run: |
          set -euo pipefail
          keychain="$RUNNER_TEMP/aria-focus-build.keychain-db"
          certificate="$RUNNER_TEMP/aria-focus-developer-id.p12"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security default-keychain -s "$keychain"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security import "$certificate" -k "$keychain" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain"
          identity=$(security find-identity -v -p codesigning "$keychain" | awk -F'"' '/Developer ID Application/ { print $2; exit }')
          test -n "$identity"
          test "$identity" = "$APPLE_SIGNING_IDENTITY"
          echo "APPLE_SIGNING_IDENTITY=$identity" >> "$GITHUB_ENV"
      - name: Build, sign, notarize, and staple app DMG
        run: pnpm -C apps/desktop tauri build --features bundled-library --config src-tauri/tauri.macos.release.conf.json
      - name: Verify signed macOS assets and checksums
        shell: bash
        run: |
          set -euo pipefail
          app=$(find target/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)
          dmg=$(find target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)
          test -n "$app" && test -n "$dmg"
          codesign --verify --deep --strict --verbose=2 "$app"
          xcrun stapler validate "$dmg"
          mkdir -p release-output
          cp "$dmg" release-output/
          shasum -a 256 release-output/*.dmg > release-output/SHA256SUMS-${{ matrix.arch }}
      - name: Upload signed macOS assets to the draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" release-output/* --clobber

  publish-release:
    name: Publish verified stable release
    needs: [build-sign-publish, build-macos-release-assets]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_release }}
    runs-on: ubuntu-latest
    environment: public-release
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
    steps:
      - name: Publish the verified draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$RELEASE_TAG" --draft=false
