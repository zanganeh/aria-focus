<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title description">
  <title id="title">Aria Focus</title>
  <desc id="description">Three violet focus ripples surrounding a warm amber centre.</desc>
  <defs>
    <radialGradient id="background" cx="50%" cy="42%" r="72%">
      <stop offset="0" stop-color="#1d1b4b"/>
      <stop offset="1" stop-color="#0b1020"/>
    </radialGradient>
    <linearGradient id="ripple" x1="18%" y1="12%" x2="82%" y2="88%">
      <stop offset="0" stop-color="#edb3ff"/>
      <stop offset="0.46" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="centre">
      <stop offset="0" stop-color="#fff4c8"/>
      <stop offset="0.55" stop-color="#f6b84a"/>
      <stop offset="1" stop-color="#df8f23"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#background)"/>
  <rect x="29" y="29" width="966" height="966" rx="200" fill="none" stroke="#8b5cf6" stroke-opacity=".28" stroke-width="18"/>
  <circle cx="512" cy="512" r="326" fill="none" stroke="url(#ripple)" stroke-width="76"/>
  <circle cx="512" cy="512" r="226" fill="none" stroke="url(#ripple)" stroke-width="66" stroke-opacity=".88"/>
  <circle cx="512" cy="512" r="132" fill="none" stroke="url(#ripple)" stroke-width="54" stroke-opacity=".78"/>
  <circle cx="512" cy="512" r="54" fill="url(#centre)"/>
</svg>
