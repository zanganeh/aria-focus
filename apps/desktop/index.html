<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1020" />
    <title>Aria Focus</title>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
        background: #0b1020;
      }
      .boot-shell {
        min-height: 100vh;
        display: grid;
        place-content: center;
        justify-items: center;
        gap: 18px;
        color: #fffaff;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
      }
      .boot-shell img {
        width: 112px;
        height: 112px;
        border-radius: 26px;
      }
      .boot-shell strong {
        font-size: 1.55rem;
        letter-spacing: -0.04em;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-shell" aria-label="Starting Aria Focus">
        <img src="/src/assets/aria-focus-mark.svg" alt="" />
        <strong>Aria Focus</strong>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
